<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.form-box{
    width:450px;
    background:#222;
    padding:25px;
    border-radius:10px;
}

h2{
    text-align:center;
}

input,select,textarea{
    width:400px;
    padding:20px;
    margin:9px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:14px;
    background:#25D366;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1da851;
}
</style>

</head>
<body>

<div class="form-box">

<h2>Student Registration</h2>

<input type="text" id="name" placeholder="Student Name" required>

<input type="text" id="examBatch" placeholder="Exam Batch">

<input type="text" id="school" placeholder="School">

<input type="tel" id="phone" placeholder="Phone Number">

<input type="email" id="email" placeholder="Email">

<input type="text" id="course" placeholder="course">


<textarea id="message" placeholder="Extra Message"></textarea>

<button onclick="sendWhatsApp()">
Register via WhatsApp
</button>

</div>

<script>

function sendWhatsApp(){

let name = document.getElementById("name").value;
let examBatch = document.getElementById("examBatch").value;
let school = document.getElementById("school").value;
let phone = document.getElementById("phone").value;
let email = document.getElementById("email").value;
let course = document.getElementById("course").value;
let message = document.getElementById("message").value;

let text = `*NEW STUDENT REGISTRATION*

👤 Name: ${name}

🎓 Exam Batch: ${examBatch}

🏫 School: ${school}

📞 Phone: ${phone}

📧 Email: ${email}

📚 Course: ${course}

📝 Message:
${message}`;

let url="https://wa.me/94741605284?text="+encodeURIComponent(text);

window.open(url,"_blank");

}

</script>

</body>
</html>
