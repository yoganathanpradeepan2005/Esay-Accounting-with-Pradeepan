<!DOCTYPE html>
<html>
<head>
<title>Accounting AI Tutor</title>

<style>

body{
    font-family:Arial;
    background:#f1f5f9;
}

.box{
    width:450px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px #999;
}

#chat{
    height:350px;
    overflow:auto;
    background:#eee;
    padding:10px;
    border-radius:10px;
}

.user{
    background:#0066ff;
    color:white;
    padding:10px;
    margin:8px;
    border-radius:10px;
}

.ai{
    background:white;
    padding:10px;
    margin:8px;
    border-radius:10px;
}


input{
    width:70%;
    padding:10px;
}

button{
    padding:10px;
    border:none;
    background:#0066ff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.clear{
    background:red;
}

</style>

</head>


<body>


<div class="box">

<h2>📘 Accounting AI Tutor</h2>

<div id="chat"></div>
<br>

<input id="question" placeholder="Ask Accounting Question">


<button onclick="send()">Send</button>

    <br>

<button class="clear" onclick="clearChat()">
🗑 Clear
</button>
<br>



</div>



<script>


// Load old chat

window.onload=function(){

let old=localStorage.getItem("accountingChat");

if(old){

document.getElementById("chat").innerHTML=old;

}

}



// Send Question

function send(){

let q=document.getElementById("question").value;


if(q=="") return;


let chat=document.getElementById("chat");


chat.innerHTML += 
"<div class='user'>Student: "+q+"</div>";


chat.innerHTML +=
"<div class='ai'>AI Tutor: Thinking...</div>";



localStorage.setItem(
"accountingChat",
chat.innerHTML
);


document.getElementById("question").value="";


}



// Clear Chat

function clearChat(){

let confirmDelete =
confirm("Delete all AI chat history?");


if(confirmDelete){

document.getElementById("chat").innerHTML="";

localStorage.removeItem("accountingChat");

}

}



// New Chat

function newChat(){

document.getElementById("chat").innerHTML="";

document.getElementById("question").value="";

}



</script>


</body>
</html>
