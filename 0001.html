<!DOCTYPE html>
<html>
<head>
<title>Accounting Vision AI Tutor</title>

<style>

body{
    font-family: Arial;
    background:#f2f5f9;
}

.container{
    width:420px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px gray;
}

h2{
    text-align:center;
    color:#0066ff;
}

#preview{
    width:250px;
    margin:15px;
    border-radius:10px;
}

button{
    background:#0066ff;
    color:white;
    padding:12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

#answer{
    margin-top:20px;
    padding:50px;
    background:#eee;
    border-radius:10px;
}

</style>

</head>


<body>


<div class="container">

<h2>📘 Accounting AI Tutor</h2>


<input type="file" 
id="image" 
accept="image/*"
onchange="previewImage()">



<br>

<img id="preview">



<br>


<button onclick="sendImage()">
Analyse Accounting Question
</button>



<div id="answer">
AI Answer will appear here...
</div>


</div>



<script>


function previewImage(){

let file =
document.getElementById("image").files[0];


document.getElementById("preview").src =
URL.createObjectURL(file);

}



async function sendImage(){

let image =
document.getElementById("image").files[0];


if(!image){

alert("Please upload an image");

return;

}



let formData = new FormData();

formData.append("image",image);



document.getElementById("answer").innerHTML =
"🤖 AI is analysing...";



let response =
await fetch("/vision",{

method:"POST",

body:formData

});



let data =
await response.json();



document.getElementById("answer").innerHTML =
data.answer;


}


</script>


</body>
</html>
